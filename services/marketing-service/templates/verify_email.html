<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Email</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif;
            background-color: #f8f9fc;
        }
        .email-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
        }
        .content {
            padding: 64px 32px;
            background: #ffffff;
            text-align: center;
        }
        .content h1 {
            color: #0D1117;
            margin: 0 0 16px 0;
            font-size: 28px;
            font-weight: 700;
        }
        .content p {
            color: #4A5568;
            font-size: 16px;
            line-height: 1.6;
            margin: 0 0 32px 0;
        }
        .code-box {
            background: #F8F9FC;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            padding: 32px;
            margin: 32px 0;
        }
        .verification-code {
            font-size: 40px;
            font-weight: 700;
            letter-spacing: 12px;
            color: #1A3C6E;
            font-family: 'Courier New', monospace;
        }
        .expiry-notice {
            color: #718096;
            font-size: 14px;
            margin-top: 24px;
        }
        .footer-note {
            color: #718096;
            font-size: 14px;
            margin-top: 48px;
        }
        @media only screen and (max-width: 600px) {
            .content {
                padding: 48px 24px;
            }
            .content h1 {
                font-size: 24px;
            }
            .verification-code {
                font-size: 32px;
                letter-spacing: 8px;
            }
            .code-box {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="email-container">
        <div class="content">
            <h1>Verify your email</h1>
            
            <p>Enter this code to verify your email address:</p>
            
            <div class="code-box">
                <div class="verification-code">{{verification_code}}</div>
            </div>
            
            <p class="expiry-notice">This code expires in 15 minutes.</p>
            
            <p class="footer-note">
                Didn't request this? You can safely ignore this email.
            </p>
        </div>
    </div>
</body>
</html>
