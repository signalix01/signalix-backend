version: '3.8'

services:
  algo-builder:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.algo-builder
    image: signalix/algo-builder:latest
    container_name: algo-builder
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
    env_file:
      - ../.env.production
    networks:
      - signalix-network
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  backtesting:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backtesting
    image: signalix/backtesting:latest
    container_name: backtesting
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - POLYGON_API_KEY=${POLYGON_API_KEY}
    env_file:
      - ../.env.production
    networks:
      - signalix-network
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  screening:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.screening
    image: signalix/screening:latest
    container_name: screening
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    env_file:
      - ../.env.production
    networks:
      - signalix-network
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  alerts:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.alerts
    image: signalix/alerts:latest
    container_name: alerts
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - GLASSNODE_API_KEY=${GLASSNODE_API_KEY}
      - UNUSUAL_WHALES_API_KEY=${UNUSUAL_WHALES_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY}
    env_file:
      - ../.env.production
    networks:
      - signalix-network
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=signalix
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - signalix-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - signalix-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery-worker:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backtesting
    image: signalix/celery-worker:latest
    container_name: celery-worker
    restart: unless-stopped
    command: celery -A services.celery_app worker --loglevel=info --concurrency=4
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
    env_file:
      - ../.env.production
    networks:
      - signalix-network
    depends_on:
      - postgres
      - redis

  celery-beat:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.screening
    image: signalix/celery-beat:latest
    container_name: celery-beat
    restart: unless-stopped
    command: celery -A services.celery_app beat --loglevel=info
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
    env_file:
      - ../.env.production
    networks:
      - signalix-network
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - signalix-network
    depends_on:
      - algo-builder
      - backtesting
      - screening
      - alerts

networks:
  signalix-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
